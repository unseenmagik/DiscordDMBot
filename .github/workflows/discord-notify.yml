name: Discord Notifications

on:
  pull_request:
    types: [opened, reopened, closed]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  push:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: msg
        shell: bash
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"

          TEXT="GitHub event in $REPO by $ACTOR"

          if [ "$EVENT" = "pull_request" ]; then
            URL="${{ github.event.pull_request.html_url }}"
            TITLE="${{ github.event.pull_request.title }}"
            MERGED="${{ github.event.pull_request.merged }}"
            if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
              TEXT="PR merged in $REPO by $ACTOR: $TITLE - $URL"
            else
              TEXT="PR $ACTION in $REPO by $ACTOR: $TITLE - $URL"
            fi
          elif [ "$EVENT" = "issue_comment" ]; then
            URL="${{ github.event.comment.html_url }}"
            TEXT="New issue/PR comment in $REPO by $ACTOR: $URL"
          elif [ "$EVENT" = "pull_request_review" ]; then
            URL="${{ github.event.review.html_url }}"
            STATE="${{ github.event.review.state }}"
            TEXT="PR review $STATE in $REPO by $ACTOR: $URL"
          elif [ "$EVENT" = "pull_request_review_comment" ]; then
            URL="${{ github.event.comment.html_url }}"
            TEXT="New PR review comment in $REPO by $ACTOR: $URL"
          elif [ "$EVENT" = "push" ]; then
            URL="https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}"
            TEXT="Push to $REPO by $ACTOR on ${{ github.ref_name }}: $URL"
          fi

          {
            echo "text<<EOF"
            echo "$TEXT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          MESSAGE_TEXT: ${{ steps.msg.outputs.text }}
        shell: bash
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK secret is empty"
            exit 1
          fi

          echo "Webhook length: ${#DISCORD_WEBHOOK}"

          jq -n --arg content "$MESSAGE_TEXT" '{content: $content}' > payload.json

          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK"